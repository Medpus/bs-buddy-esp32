; ============================================================================
;  BS-Buddy — always-on Nightscout blood sugar display
;
;  Multi-board firmware. Shared code lives in src/{core,view,hal}; each board
;  has its own src/board/<name>/ (display + touch + pins) and a [env:<name>].
;  build_src_filter compiles ONLY the active board's dir, so boards never clash.
;
;  Adding a board: see docs/ADDING_A_BOARD.md.
; ============================================================================

[platformio]
boards_dir   = boards          ; PlatformIO board JSONs (HW: flash/PSRAM/partitions)
src_dir      = src
include_dir  = include
default_envs = jc3248w535

; ---- Shared across all boards ----
[env]
framework        = arduino
monitor_speed    = 115200

; Compile shared code + the active board only. Each [env:<board>] re-adds its
; own dir (see below). src/board/_template stays excluded everywhere.
build_src_filter = +<*> -<board/>

build_flags =
  ; LVGL: use our include/lv_conf.h and the simple <lvgl.h> include form
  -D LV_CONF_INCLUDE_SIMPLE
  -D LV_LVGL_H_INCLUDE_SIMPLE
  ; Layered include paths so cross-layer #includes work from any dir
  -I include
  -I src/core
  -I src/view
  -I src/hal
  ; Firmware version string (shown on the splash screen)
  -D BSB_VERSION=\"0.1.0\"

lib_deps =
  moononournation/GFX Library for Arduino@^1.5.0
  lvgl/lvgl@^9.2.2
  bblanchon/ArduinoJson@^7.2.0

; ============================================================================
;  Board: Guition JC3248W535 (ESP32-S3-WROOM-1 N16R8)
;    - 16 MB QIO flash + 8 MB OCTAL (OPI) PSRAM
;    - AXS15231B display (QSPI, 320x480) + AXS15231B capacitive touch (I2C)
;    - Native USB (no UART bridge); VID:PID 303A:1001
;
;  PSRAM is OCTAL -> the custom board (boards/jc3248w535.json) sets
;  memory_type=qio_opi. A plain esp32-s3-devkitc-1 would leave PSRAM
;  disabled and the ~300 KB display canvas allocation fails -> blank screen.
; ============================================================================
[env:jc3248w535]
; pioarduino fork — provides arduino-esp32 3.x (the official platformio
; espressif32 platform is stuck on the EOL 2.x core, which Arduino_GFX 1.6+
; no longer builds against). Pinned for reproducible builds.
platform         = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board            = jc3248w535
upload_speed     = 921600
monitor_filters  = esp32_exception_decoder, time

build_src_filter = ${env.build_src_filter} +<board/jc3248w535/>
build_flags      = ${env.build_flags} -D BSB_BOARD_JC3248W535
